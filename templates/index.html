<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row">
            <div class="col-lg-7 col-md-9 mx-auto">
                <div class="card shadow-sm">
                    <div class="card-header fw-semibold">Add Todo</div>
                    <div class="card-body">
                        <form id="todoForm">
                            <div>
                                <label for="task" class="form-label">Task</label>
                                <input type="text" class="form-control" id="task" placeholder="Enter your task"
                                    required>
                            </div>
                            <div class="mt-2">
                                <label for="desc" class="form-label">Description</label>
                                <input type="text" class="form-control" id="desc" placeholder="Enter task description">
                            </div>
                            <div class="mt-2">
                                <label for="priority" class="form-label">Priority</label>
                                <select class="form-select" id="priority">
                                    <option value="">Select Priority</option>
                                    <option value="high">High</option>
                                    <option value="medium">Medium</option>
                                    <option value="low">Low</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mt-3">Add Todo</button>
                        </form>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-4 mb-2">
                    <h1 class="h5 mb-0">Todos</h1>
                    <span id="todoCount" class="badge bg-secondary">0</span>
                </div>

                <div id="alertBox"></div>
                <div id="todoList"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-danger">Delete Todo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted text-center mb-4">Are you sure you want to delete this todo?</p>
                    <input type="hidden" id="deleteId">
                    <div class="btn-group w-100">
                        <button type="button" class="btn btn-outline-danger" id="confirmDeleteBtn">Yes</button>
                        <button type="button" class="btn btn-success" data-bs-dismiss="modal">No</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const todoForm = document.getElementById("todoForm");
        const todoList = document.getElementById("todoList");
        const todoCount = document.getElementById("todoCount");
        const alertBox = document.getElementById("alertBox");
        const deleteModal = new bootstrap.Modal(document.getElementById("deleteModal"));

        let todos = [];

        function showAlert(message, type = "success") {
            alertBox.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
        }

        function priorityBadge(priority) {
            const badges = {
                high: "danger",
                medium: "warning text-dark",
                low: "success"
            };
            const label = priority || "none";
            return `<span class="badge bg-${badges[priority] || "secondary"} text-capitalize">${label}</span>`;
        }

        function escapeHtml(value) {
            const div = document.createElement("div");
            div.textContent = value || "";
            return div.innerHTML;
        }

        function renderTodos() {
            todoCount.textContent = todos.length;

            if (!todos.length) {
                todoList.innerHTML = '<div class="alert alert-info">No todos yet. Add your first todo above.</div>';
                return;
            }

            todoList.innerHTML = todos.map((todo) => `
                <div class="card mt-3 shadow-sm">
                    <div class="card-header d-flex justify-content-between align-items-center gap-2">
                        <span class="fw-semibold text-dark">${escapeHtml(todo.task)}</span>
                        <div class="d-flex align-items-center gap-2">
                            ${priorityBadge(todo.priority)}
                            <button type="button" class="btn btn-sm btn-danger" onclick="openDelete(${todo.id})">
                                Delete
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        ${todo.desc ? escapeHtml(todo.desc) : '<span class="text-muted">No description</span>'}
                    </div>
                </div>
            `).join("");
        }

        async function fetchTodos() {
            const response = await fetch("/todos");
            todos = await response.json();
            renderTodos();
        }

        async function saveTodo(url, method, payload) {
            const response = await fetch(url, {
                method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || "Something went wrong");
            }

            return data;
        }

        todoForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            try {
                await saveTodo("/todos", "POST", {
                    task: document.getElementById("task").value,
                    desc: document.getElementById("desc").value,
                    priority: document.getElementById("priority").value
                });
                todoForm.reset();
                showAlert("Todo added successfully");
                fetchTodos();
            } catch (error) {
                showAlert(error.message, "danger");
            }
        });

        function openDelete(id) {
            document.getElementById("deleteId").value = id;
            deleteModal.show();
        }

        document.getElementById("confirmDeleteBtn").addEventListener("click", async () => {
            const id = document.getElementById("deleteId").value;

            try {
                const response = await fetch(`/todo/${id}`, { method: "DELETE" });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || "Something went wrong");
                }

                deleteModal.hide();
                showAlert("Todo deleted successfully");
                fetchTodos();
            } catch (error) {
                showAlert(error.message, "danger");
            }
        });

        fetchTodos();
    </script>
</body>

</html>
